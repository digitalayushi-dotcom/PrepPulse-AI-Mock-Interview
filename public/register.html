<!DOCTYPE html>
<html>

<head>
  <title>Register</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for your AI Mock Interview account.">
  <link rel="icon" type="image/png" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="login-body">

  <div class="login-box">
    <h2>Register</h2>

    <input type="email" placeholder="Enter Email" id="regEmail">
    <input type="password" placeholder="Create Password" id="regPassword">

    <button onclick="register()">Register</button>

    <p style="margin-top:10px;">
      Already have an account?
      <a href="login.html" style="color:white;">Login</a>
    </p>
  </div>

  <script>
    function register() {
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;

      if (!email || !password) {
        alert("Please fill all fields");
        return;
      }

      let users = JSON.parse(localStorage.getItem("users")) || [];
      // Check for duplicate email
      const exists = users.some(user => user.email === email);
      if (exists) {
        alert("Email already registered. Please login or use another email.");
        return;
      }

      const userData = {
        email: email,
        password: password
      };

      users.push(userData);
      localStorage.setItem("users", JSON.stringify(users));

      alert("Registration successful!");
      window.location.href = "login.html";
    }
  </script>
</body>

</html>
